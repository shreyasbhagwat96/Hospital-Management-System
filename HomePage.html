<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanjiavni Hospital</title>
  <link href="index.html" rel="stylesheet">
  <style>
    * {
      margin: 1;
      padding: 1;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #76bef1, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #2c3e50;
    }

    .container {
      background: #fff;
      padding: 40px 30px 30px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 500px;
      width: 90%;
      position: relative;
    }

    .logo-img {
      width: 70px;
      height: 70px;
      margin-bottom: 20px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .headline {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 30px;
      color: #0a3d62;
    }

    .doctor-img {
      
      width: 300px;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
      margin-bottom: 40px;
      object-fit: cover;
    }

    .go-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #2980b9, #3498db);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .go-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(52, 152, 219, 0.5);
    }

    .arrow {
      transition: transform 0.3s ease;
    }

    .go-button:hover .arrow {
      transform: translateX(5px);
    }

    @media (max-width: 600px) {
      .headline {
        font-size: 24px;
      }

      .doctor-img {
        width: 200px;
      }

      .logo-img {
        width: 55px;
        height: 55px;
      }

      .go-button {
        font-size: 16px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo image at top -->
    <img class="logo-img" src="Logo.png.jpg" alt="Hospital Logo">

    <!-- Headline -->
    <div class="headline">Sanjiavni Hospital</div>

    <!-- Doctor image -->
    <img class="doctor-img" src="img2.jpg" alt="Doctor Image">

    <!-- Button at bottom -->
    <a href="about.html" class="go-button">
      Let's Go <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
